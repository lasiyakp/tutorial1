name: Docker Build Python

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t python-app .

      - name: Run container
        run: docker run -d -p 3000:3000 python-app
